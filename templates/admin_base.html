<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel | BreastCancerAI{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Admin Header */
        .admin-header {
            background: var(--surface-light);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .admin-logo h2 {
            font-size: 1.2rem;
        }

        .admin-logo span {
            color: var(--primary-pink);
        }

        .admin-header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            background: var(--surface-alt-light);
        }

        .notification-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .admin-user-menu {
            position: relative;
        }

        .admin-user-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            color: var(--text-light);
        }

        .admin-user-btn:hover {
            background: var(--surface-alt-light);
        }

        .admin-user-avatar {
            width: 35px;
            height: 35px;
            background: var(--gradient-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .admin-user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--surface-light);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .admin-user-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .admin-user-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-secondary-light);
            transition: all 0.2s ease;
        }

        .admin-user-dropdown a:hover {
            background: var(--gradient-pink);
            color: white;
        }

        .admin-user-dropdown hr {
            margin: 8px;
            border-color: var(--border-light);
        }

        /* Admin Container */
        .admin-app {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar */
        .admin-sidebar {
            width: 280px;
            background: var(--surface-light);
            border-right: 1px solid var(--border-light);
            transition: all 0.3s ease;
            position: fixed;
            height: calc(100vh - 60px);
            overflow-y: auto;
            z-index: 99;
        }

        .admin-sidebar.collapsed {
            width: 80px;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 20px;
            width: 24px;
            height: 24px;
            background: var(--primary-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 0.7rem;
            z-index: 100;
        }

        .sidebar-nav {
            padding: 20px 16px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-secondary-light);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-item i {
            width: 24px;
        }

        .sidebar-item span {
            transition: opacity 0.3s ease;
        }

        .admin-sidebar.collapsed .sidebar-item span {
            opacity: 0;
            width: 0;
            display: none;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background: var(--gradient-pink);
            color: white;
        }

        .sidebar-divider {
            margin: 16px 0;
            border-top: 1px solid var(--border-light);
        }

        /* Main Content */
        .admin-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
            transition: margin-left 0.3s ease;
            min-height: calc(100vh - 60px);
        }

        .admin-content.expanded {
            margin-left: 80px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }

            .admin-sidebar {
                transform: translateX(-100%);
            }

            .admin-sidebar.mobile-open {
                transform: translateX(0);
            }

            .admin-content {
                margin-left: 0;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Admin Header -->
    <header class="admin-header">
        <div class="admin-header-left">
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="admin-logo">
                <h2><i class="fas fa-shield-alt"></i> BreastCancer<span>AI</span> <span
                        style="font-size: 0.8rem;">Admin</span></h2>
            </div>
        </div>

        <div class="admin-header-actions">
            <button class="notification-btn" id="notificationBtn">
                <i class="fas fa-bell"></i>
                <span class="notification-badge" id="notificationBadge">0</span>
            </button>

            <div class="admin-user-menu">
                <button class="admin-user-btn" id="adminUserBtn">
                    <div class="admin-user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <span>{{ session.username[:15] }}</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="admin-user-dropdown" id="adminUserDropdown">
                    <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a href="{{ url_for('admin_users') }}"><i class="fas fa-users"></i> Users</a>
                    <a href="{{ url_for('admin_system') }}"><i class="fas fa-server"></i> System</a>
                    <hr>
                    <a href="{{ url_for('dashboard') }}"><i class="fas fa-globe"></i> Frontend Site</a>
                    <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <button class="admin-user-btn" id="themeToggle">
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </header>

    <!-- Admin App -->
    <div class="admin-app">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-chevron-left"></i>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin_dashboard') }}"
                    class="sidebar-item {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin_users') }}"
                    class="sidebar-item {% if request.endpoint == 'admin_users' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span>Users Management</span>
                </a>
                <a href="{{ url_for('admin_predictions') }}"
                    class="sidebar-item {% if request.endpoint == 'admin_predictions' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i>
                    <span>All Predictions</span>
                </a>
                <a href="{{ url_for('admin_messages') }}"
                    class="sidebar-item {% if request.endpoint == 'admin_messages' %}active{% endif %}">
                    <i class="fas fa-envelope"></i>
                    <span>Contact Messages</span>
                </a>
                <a href="{{ url_for('admin_system') }}"
                    class="sidebar-item {% if request.endpoint == 'admin_system' %}active{% endif %}">
                    <i class="fas fa-server"></i>
                    <span>System Monitor</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="{{ url_for('index') }}" class="sidebar-item">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Site</span>
                </a>
                <a href="{{ url_for('logout') }}" class="sidebar-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-content" id="adminContent">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        }

        // Sidebar Toggle
        const sidebar = document.getElementById('adminSidebar');
        const content = document.getElementById('adminContent');
        const toggleBtn = document.getElementById('sidebarToggle');

        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
                const icon = toggleBtn.querySelector('i');
                if (sidebar.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
            });
        }

        // Mobile Menu Toggle
        const mobileToggle = document.getElementById('mobileMenuToggle');
        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                sidebar.classList.toggle('mobile-open');
            });
        }

        // Admin User Dropdown
        const adminUserBtn = document.getElementById('adminUserBtn');
        const adminUserDropdown = document.getElementById('adminUserDropdown');

        if (adminUserBtn && adminUserDropdown) {
            adminUserBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                adminUserDropdown.classList.toggle('show');
            });

            document.addEventListener('click', (e) => {
                if (!adminUserBtn.contains(e.target)) {
                    adminUserDropdown.classList.remove('show');
                }
            });
        }

        // Notification count (example)
        const notificationBadge = document.getElementById('notificationBadge');
        if (notificationBadge) {
            fetch('/admin/notification-count')
                .then(res => res.json())
                .then(data => {
                    if (data.count > 0) {
                        notificationBadge.textContent = data.count;
                        notificationBadge.style.display = 'inline-block';
                    } else {
                        notificationBadge.style.display = 'none';
                    }
                })
                .catch(() => { });
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
