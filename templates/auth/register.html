{% extends "base.html" %}

{% block title %}Register | Breast Cancer AI{% endblock %}

{% block content %}
<div class="about-header">
    <h1>Create <span class="hero-gradient-text">Account</span></h1>
    <p>Join us in the journey of early breast cancer detection</p>
</div>

<div class="contact-container" style="max-width: 500px;">
    <div class="contact-form">
        <h2><i class="fas fa-user-plus" style="color: var(--primary-color);"></i> Register New Account</h2>
        
        {% if error %}
            <div style="background: var(--danger); color: white; padding: 0.75rem; border-radius: 12px; margin-bottom: 1rem;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
